name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  migrate-syntax:
    name: migration sql syntax check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: family_hub_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply all migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/family_hub_ci?sslmode=disable
          PGSSLMODE: disable
        run: node server/db/migrate.mjs

      - name: Verify migration status is fully applied
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/family_hub_ci?sslmode=disable
          PGSSLMODE: disable
        run: |
          set -euo pipefail
          STATUS=$(node server/db/migrate.mjs --status)
          echo "$STATUS"
          if echo "$STATUS" | grep -q '"pending": \[\]' || echo "$STATUS" | grep -q '"pending":\[\]'; then
            echo "All migrations applied."
          else
            echo "::error::Pending migrations remain after run."
            exit 1
          fi
